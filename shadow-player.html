<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────── */
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-border:#d4d1ca;--color-divider:#dcd9d5;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-success-hl:color-mix(in oklch,#437a22 14%,transparent);
  --color-error:#a12c7b;
  --color-warning:#964219;--color-warning-hl:color-mix(in oklch,#964219 14%,transparent);
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);
  --transition:180ms cubic-bezier(.16,1,.3,1);
  --font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-border:#393836;--color-divider:#262523;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
  --color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-success-hl:color-mix(in oklch,#6daa45 16%,transparent);
  --color-error:#d163a7;
  --color-warning:#bb653b;--color-warning-hl:color-mix(in oklch,#bb653b 14%,transparent);
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-border:#393836;--color-divider:#262523;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
  --color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-success-hl:color-mix(in oklch,#6daa45 16%,transparent);
  --color-error:#d163a7;
  --color-warning:#bb653b;--color-warning-hl:color-mix(in oklch,#bb653b 14%,transparent);
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
}}

/* ── BASE ────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--color-text);background:var(--color-bg);line-height:1.6;}
img,video,svg{display:block;max-width:100%;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;
  transition:color var(--transition),background var(--transition),box-shadow var(--transition),opacity var(--transition);}
input,select{font:inherit;color:inherit;
  transition:border-color var(--transition),box-shadow var(--transition);}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{
  animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* ── LAYOUT ──────────────────────────────────────── */
.app{max-width:900px;margin-inline:auto;padding:var(--space-6) var(--space-4) var(--space-12);
  display:flex;flex-direction:column;gap:var(--space-5);}

/* ── HEADER ──────────────────────────────────────── */
header{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);}
.logo{display:flex;align-items:center;gap:var(--space-3);}
.logo-icon{color:var(--color-primary);flex-shrink:0;}
.logo-text{font-size:var(--text-lg);font-weight:700;letter-spacing:-.025em;line-height:1.1;}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;}
.header-actions{display:flex;align-items:center;gap:var(--space-2);}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);color:var(--color-text-muted);}
.icon-btn:hover{background:var(--color-surface-2);color:var(--color-text);}

/* ── URL INPUT ───────────────────────────────────── */
.url-card{background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-xl);padding:var(--space-4) var(--space-5);
  display:flex;flex-direction:column;gap:var(--space-3);box-shadow:var(--shadow-sm);}
.url-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);
  text-transform:uppercase;letter-spacing:.06em;}
.url-row{display:flex;gap:var(--space-3);}
.url-input{flex:1;padding:var(--space-3) var(--space-4);background:var(--color-surface-2);
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  font-size:var(--text-sm);outline:none;}
.url-input:focus{border-color:var(--color-primary);
  box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 18%,transparent);}
.url-input::placeholder{color:var(--color-text-faint);}
.btn-load{padding:var(--space-3) var(--space-6);background:var(--color-primary);color:#fff;
  border-radius:var(--radius-lg);font-size:var(--text-sm);font-weight:600;white-space:nowrap;
  box-shadow:var(--shadow-sm);}
.btn-load:hover{background:var(--color-primary-hover);}
.btn-load:active{background:var(--color-primary-active);}
.btn-load:disabled{opacity:.5;cursor:not-allowed;}

/* ── VIDEO ───────────────────────────────────────── */
.video-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--radius-xl);
  overflow:hidden;background:var(--color-surface);box-shadow:var(--shadow-lg);}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:var(--space-4);
  color:var(--color-text-faint);background:var(--color-surface);}
.video-placeholder svg{opacity:.3;}
.video-placeholder p{font-size:var(--text-sm);color:var(--color-text-muted);}


/* ── CONTROLS ────────────────────────────────────── */
.controls-card{background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-xl);padding:var(--space-5);
  display:flex;flex-direction:column;gap:var(--space-4);box-shadow:var(--shadow-sm);}

/* Progress */
.progress-wrap{display:flex;align-items:center;gap:var(--space-3);}
.progress-time{font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--color-text-muted);white-space:nowrap;min-width:38px;}
.progress-track{flex:1;height:5px;background:var(--color-surface-dynamic);
  border-radius:var(--radius-full);overflow:hidden;cursor:pointer;position:relative;}
.progress-track:hover{height:7px;margin-block:-1px;}
.progress-fill{height:100%;background:var(--color-primary);
  border-radius:var(--radius-full);transition:width .15s linear;}

/* Chunk nav */
.chunk-nav{display:flex;align-items:center;justify-content:center;gap:var(--space-3);}
.nav-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);background:var(--color-surface-2);
  border:1px solid var(--color-border);color:var(--color-text-muted);}
.nav-btn:hover:not(:disabled){background:var(--color-surface-offset);color:var(--color-text);
  box-shadow:var(--shadow-sm);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-btn.replay-btn{width:58px;height:58px;border-radius:var(--radius-lg);
  background:var(--color-primary);color:#fff;border:none;font-size:1.6rem;line-height:1;}
.nav-btn.replay-btn:hover{background:var(--color-primary-hover);}
.nav-btn.replay-btn:active{background:var(--color-primary-active);transform:scale(.96);}
.chunk-label{font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--color-text-muted);text-align:center;min-width:100px;line-height:1.4;}
.chunk-label strong{display:block;font-size:var(--text-sm);color:var(--color-text);font-family:var(--font-body);}

.divider{height:1px;background:var(--color-divider);}

/* Settings */
.settings-row{display:flex;flex-wrap:wrap;gap:var(--space-4);align-items:center;}
.setting-group{display:flex;align-items:center;gap:var(--space-2);}
.setting-label{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;}
.setting-field{padding:var(--space-1) var(--space-3);background:var(--color-surface-2);
  border:1px solid var(--color-border);border-radius:var(--radius-md);
  font-size:var(--text-xs);font-family:var(--font-mono);
  outline:none;min-width:64px;}
.setting-field:focus{border-color:var(--color-primary);}
select.setting-field{min-width:72px;}

/* Toggle */
.toggle-group{display:flex;align-items:center;gap:var(--space-2);cursor:pointer;
  user-select:none;}
.toggle{width:36px;height:20px;background:var(--color-surface-dynamic);
  border-radius:var(--radius-full);position:relative;flex-shrink:0;
  transition:background var(--transition);}
.toggle.on{background:var(--color-primary);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
  background:#fff;border-radius:50%;transition:transform var(--transition);
  box-shadow:0 1px 3px oklch(0 0 0/.25);}
.toggle.on::after{transform:translateX(16px);}

/* Keyboard hints */
.kb-row{display:flex;gap:var(--space-4);flex-wrap:wrap;}
.kb-hint{display:flex;align-items:center;gap:var(--space-1);
  font-size:var(--text-xs);color:var(--color-text-faint);}
.kbd{display:inline-flex;align-items:center;justify-content:center;
  padding:1px 7px;background:var(--color-surface-2);
  border:1px solid var(--color-border);border-bottom-width:2px;
  border-radius:var(--radius-sm);font-family:var(--font-mono);
  font-size:.68rem;line-height:1.7;color:var(--color-text-muted);}

/* ── NOTICE ──────────────────────────────────────── */
.notice{background:color-mix(in oklch,var(--color-primary) 8%,var(--color-surface));
  border:1px solid color-mix(in oklch,var(--color-primary) 22%,var(--color-border));
  border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);
  font-size:var(--text-xs);color:var(--color-text-muted);
  display:flex;gap:var(--space-2);align-items:flex-start;line-height:1.5;}
.notice svg{flex-shrink:0;margin-top:1px;color:var(--color-primary);}
.notice strong{color:var(--color-primary);}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:580px){
  .url-row{flex-direction:column;}
  .btn-load{width:100%;}
  .settings-row{flex-direction:column;align-items:flex-start;gap:var(--space-3);}
  .kb-row{gap:var(--space-2);}
  .chunk-label{min-width:80px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">
      <svg class="logo-icon" width="34" height="34" viewBox="0 0 34 34" fill="none" aria-hidden="true">
        <rect width="34" height="34" rx="9" fill="currentColor" opacity=".15"/>
        <path d="M13 11v12l10-6-10-6z" fill="currentColor"/>
        <rect x="7" y="27" width="20" height="2.5" rx="1.25" fill="currentColor" opacity=".4"/>
      </svg>
      <div>
        <div class="logo-text">Shadow Player</div>
        <div class="logo-sub">Language shadowing · YouTube</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" aria-label="Toggle light/dark mode"></button>
    </div>
  </header>

  <!-- ── URL INPUT ── -->
  <div class="url-card">
    <span class="url-label">YouTube URL</span>
    <div class="url-row">
      <input id="urlInput" class="url-input" type="url"
        placeholder="https://youtu.be/… or https://www.youtube.com/watch?v=…"
        autocomplete="off" spellcheck="false" aria-label="YouTube video URL"/>
      <button class="btn-load" id="loadBtn" aria-label="Load video">Load</button>
    </div>
  </div>

  <!-- ── VIDEO ── -->
  <div class="video-wrap" id="videoWrap">
    <div class="video-placeholder" id="placeholder">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="5" width="20" height="14" rx="2.5"/>
        <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
      </svg>
      <p>Paste a YouTube URL above and press Load</p>
    </div>
    <div id="yt-player" style="display:none;position:absolute;inset:0;width:100%;height:100%;"></div>
  </div>


  <!-- ── CONTROLS ── -->
  <div class="controls-card" id="controlsCard" style="display:none;">

    <!-- Progress bar -->
    <div class="progress-wrap">
      <span class="progress-time" id="timeCurrent">0:00</span>
      <div class="progress-track" id="progressTrack" role="slider" aria-label="Video progress" tabindex="0">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-time" id="timeDuration">0:00</span>
    </div>

    <!-- Chunk navigation -->
    <div class="chunk-nav">
      <button class="nav-btn" id="prevBtn" title="Previous chunk (←)" disabled aria-label="Previous chunk">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn replay-btn" id="replayBtn" title="Replay this chunk (Space)" aria-label="Replay chunk">↺</button>
      <button class="nav-btn" id="nextBtn" title="Next chunk (→)" disabled aria-label="Next chunk">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="chunk-label" id="chunkLabel">
        <strong>—</strong>
        <span id="chunkCounter">Load a video to start</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Settings -->
    <div class="settings-row">
      <div class="setting-group">
        <label class="setting-label" for="chunkSizeInput">Chunk size</label>
        <input class="setting-field" id="chunkSizeInput" type="number" min="3" max="120" value="10" step="1" aria-label="Chunk size in seconds"/>
        <span class="setting-label">sec</span>
      </div>
      <div class="setting-group">
        <label class="setting-label" for="speedSelect">Speed</label>
        <select class="setting-field" id="speedSelect" aria-label="Playback speed">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </div>
      <div class="toggle-group" id="autoToggleGroup" role="switch" aria-checked="false" tabindex="0" title="Auto-advance to next chunk after each ends">
        <div class="toggle" id="autoToggle"></div>
        <span class="setting-label">Auto-advance</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Keyboard hints -->
    <div class="kb-row">
      <div class="kb-hint"><kbd class="kbd">Space</kbd> Replay</div>
      <div class="kb-hint"><kbd class="kbd">←</kbd> Prev chunk</div>
      <div class="kb-hint"><kbd class="kbd">→</kbd> Next chunk</div>
      <div class="kb-hint"><kbd class="kbd">R</kbd> Change speed</div>
    </div>
  </div>

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let player      = null;
let ready       = false;
let videoId     = null;
let duration    = 0;
let chunk       = 0;
let chunkSize   = 10;
let speed       = 1;
let autoAdvance = false;
let timerRef    = null;
const SPEEDS    = [0.5, 0.75, 1, 1.25, 1.5, 2];

// ═══════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════
const $  = id => document.getElementById(id);
const urlInput      = $('urlInput');
const loadBtn       = $('loadBtn');
const placeholder   = $('placeholder');
const ytEl          = $('yt-player');
const controlsCard  = $('controlsCard');
const prevBtn       = $('prevBtn');
const nextBtn       = $('nextBtn');
const replayBtn     = $('replayBtn');
const chunkLabel    = $('chunkLabel').querySelector('strong');
const chunkCounter  = $('chunkCounter');
const progressFill  = $('progressFill');
const progressTrack = $('progressTrack');
const timeCurrent   = $('timeCurrent');
const timeDuration  = $('timeDuration');
const chunkSizeInput= $('chunkSizeInput');
const speedSelect   = $('speedSelect');
const autoToggle    = $('autoToggle');
const autoToggleGroup=$('autoToggleGroup');


// ═══════════════════════════════════════════════════
//  THEME TOGGLE
// ═══════════════════════════════════════════════════
(function(){
  const btn = $('themeBtn');
  const html = document.documentElement;
  let mode = html.getAttribute('data-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  html.setAttribute('data-theme', mode);
  function update() {
    btn.innerHTML = mode === 'dark'
      ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
    btn.setAttribute('aria-label', `Switch to ${mode === 'dark' ? 'light' : 'dark'} mode`);
  }
  update();
  btn.addEventListener('click', () => {
    mode = mode === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', mode);
    update();
  });
})();

// ═══════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════
function parseVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|\/shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function fmt(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = String(sec % 60).padStart(2, '0');
  return `${m}:${s}`;
}
function totalChunks() {
  return duration ? Math.ceil(duration / chunkSize) : 0;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════
//  LOAD VIDEO
// ═══════════════════════════════════════════════════
loadBtn.addEventListener('click', loadVideo);
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadVideo(); });

function loadVideo() {
  const id = parseVideoId(urlInput.value.trim());
  if (!id) {
    urlInput.focus();
    urlInput.style.borderColor = 'var(--color-error)';
    setTimeout(() => urlInput.style.borderColor = '', 1500);
    return;
  }
  videoId = id;
  chunk = 0;
  ready = false;
  clearInterval(timerRef);

  placeholder.style.display = 'none';
  ytEl.style.display = 'block';
  controlsCard.style.display = 'flex';

  initPlayer(id);
}

// ═══════════════════════════════════════════════════
//  YOUTUBE PLAYER
// ═══════════════════════════════════════════════════
(function loadYTAPI() {
  if (window.YT) return;
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

function initPlayer(vid) {
  if (player) { try { player.destroy(); } catch {} player = null; }
  player = new window.YT.Player('yt-player', {
    videoId: vid,
    playerVars: { autoplay: 1, rel: 0, modestbranding: 1, start: 0, cc_load_policy: 0 },
    events: {
      onReady(e) {
        ready = true;
        const d = e.target.getDuration();
        if (d) { duration = d; timeDuration.textContent = fmt(d); }
        e.target.setPlaybackRate(speed);
        updateChunkUI();
      },
      onStateChange(e) {
        const S = window.YT.PlayerState;
        if (e.data === S.PLAYING) startChunkTimer();
        else clearInterval(timerRef);
      }
    }
  });
}

// onYouTubeIframeAPIReady — called by YT script if API loads before initPlayer
window.onYouTubeIframeAPIReady = function() {};

// ═══════════════════════════════════════════════════
//  CHUNK TIMER
// ═══════════════════════════════════════════════════
function startChunkTimer() {
  clearInterval(timerRef);
  timerRef = setInterval(() => {
    if (!player || !player.getCurrentTime) return;
    const t = player.getCurrentTime();
    const end = (chunk + 1) * chunkSize;

    // Update time & progress
    timeCurrent.textContent = fmt(t);
    if (duration > 0) progressFill.style.width = (t / duration * 100) + '%';

    // Chunk boundary check
    if (t >= end) {
      clearInterval(timerRef);
      const totalC = Math.ceil((player.getDuration ? player.getDuration() : duration) / chunkSize);
      if (autoAdvance) {
        const next = chunk + 1;
        if (next < totalC) { chunk = next; player.seekTo(next * chunkSize, true); player.playVideo(); updateChunkUI(); }
        else player.pauseVideo();
      } else {
        player.pauseVideo();
      }
    }
  }, 150);
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function goToChunk(idx) {
  if (!player || !ready) return;
  chunk = Math.max(0, Math.min(idx, totalChunks() - 1));
  player.seekTo(chunk * chunkSize, true);
  player.playVideo();
  updateChunkUI();
}

replayBtn.addEventListener('click', () => goToChunk(chunk));
prevBtn.addEventListener('click',   () => goToChunk(chunk - 1));
nextBtn.addEventListener('click',   () => goToChunk(chunk + 1));

function updateChunkUI() {
  const total = totalChunks();
  const start = chunk * chunkSize;
  const end   = Math.min((chunk + 1) * chunkSize, duration);
  chunkLabel.textContent  = total > 0 ? `${fmt(start)} – ${fmt(end)}` : '—';
  chunkCounter.textContent= total > 0 ? `Chunk ${chunk + 1} of ${total}` : 'Load a video to start';
  prevBtn.disabled = chunk <= 0;
  nextBtn.disabled = total === 0 || chunk >= total - 1;
}

// ═══════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════
chunkSizeInput.addEventListener('change', () => {
  const v = Math.max(3, Math.min(120, parseInt(chunkSizeInput.value) || 10));
  chunkSize = v;
  chunkSizeInput.value = v;
  chunk = 0;
  updateChunkUI();
});

speedSelect.addEventListener('change', () => {
  speed = parseFloat(speedSelect.value);
  if (player && player.setPlaybackRate) player.setPlaybackRate(speed);
});

function toggleAuto() {
  autoAdvance = !autoAdvance;
  autoToggle.classList.toggle('on', autoAdvance);
  autoToggleGroup.setAttribute('aria-checked', String(autoAdvance));
}
autoToggleGroup.addEventListener('click', toggleAuto);
autoToggleGroup.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleAuto(); } });

// ═══════════════════════════════════════════════════
//  PROGRESS BAR SEEK
// ═══════════════════════════════════════════════════
function seekFromClick(e) {
  if (!ready || !player || !duration) return;
  const rect = progressTrack.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const t    = pct * duration;
  chunk = Math.floor(t / chunkSize);
  player.seekTo(t, true);
  player.playVideo();
  updateChunkUI();
}
progressTrack.addEventListener('click', seekFromClick);
progressTrack.addEventListener('keydown', e => {
  if (!ready) return;
  if (e.key === 'ArrowRight') goToChunk(chunk + 1);
  if (e.key === 'ArrowLeft')  goToChunk(chunk - 1);
});

// ═══════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════
let speedCycle = 0;
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (!videoId) return;
  switch(e.code) {
    case 'Space':       e.preventDefault(); goToChunk(chunk); break;
    case 'ArrowRight':  e.preventDefault(); goToChunk(chunk + 1); break;
    case 'ArrowLeft':   e.preventDefault(); goToChunk(chunk - 1); break;
    case 'KeyR':
      speedCycle = (speedCycle + 1) % SPEEDS.length;
      speed = SPEEDS[speedCycle];
      speedSelect.value = speed;
      if (player && player.setPlaybackRate) player.setPlaybackRate(speed);
      break;
  }
});
</script>
</body>
