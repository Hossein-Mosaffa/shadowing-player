<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-border:#d4d1ca;--color-divider:#dcd9d5;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;
  --color-primary-hl:#cedcd8;
  --color-success:#437a22;--color-success-hl:color-mix(in oklch,#437a22 14%,transparent);
  --color-error:#a12c7b;
  --color-warning:#964219;--color-warning-hl:color-mix(in oklch,#964219 14%,transparent);
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);
  --transition:180ms cubic-bezier(.16,1,.3,1);
  --font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-border:#393836;--color-divider:#262523;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
  --color-primary-hl:#313b3b;
  --color-success:#6daa45;--color-success-hl:color-mix(in oklch,#6daa45 16%,transparent);
  --color-error:#d163a7;
  --color-warning:#bb653b;--color-warning-hl:color-mix(in oklch,#bb653b 14%,transparent);
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);
  --shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-border:#393836;--color-divider:#262523;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
  --color-primary-hl:#313b3b;
  --color-success:#6daa45;--color-success-hl:color-mix(in oklch,#6daa45 16%,transparent);
  --color-error:#d163a7;
  --color-warning:#bb653b;--color-warning-hl:color-mix(in oklch,#bb653b 14%,transparent);
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);
  --shadow-md:0 4px 12px oklch(0 0 0/.3);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--color-text);background:var(--color-bg);line-height:1.6;}
img,video,svg{display:block;max-width:100%;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;
  transition:color var(--transition),background var(--transition),
    box-shadow var(--transition),transform var(--transition);}
input,select{font:inherit;color:inherit;
  transition:border-color var(--transition),box-shadow var(--transition);}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{
  animation-duration:.01ms!important;transition-duration:.01ms!important;}}

.app{max-width:900px;margin-inline:auto;
  padding:var(--space-6) var(--space-4) var(--space-8);
  display:flex;flex-direction:column;gap:var(--space-5);}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:var(--space-3);}
.logo-icon{color:var(--color-primary);}
.logo-text{font-size:var(--text-lg);font-weight:700;letter-spacing:-.025em;line-height:1.1;}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);color:var(--color-text-muted);}
.icon-btn:hover{background:var(--color-surface-2);color:var(--color-text);}

/* URL CARD */
.url-card{background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-xl);padding:var(--space-4) var(--space-5);
  display:flex;flex-direction:column;gap:var(--space-3);box-shadow:var(--shadow-sm);}
.url-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);
  text-transform:uppercase;letter-spacing:.06em;}
.url-row{display:flex;gap:var(--space-3);}
.url-input{flex:1;padding:var(--space-3) var(--space-4);background:var(--color-surface-2);
  border:1px solid var(--color-border);border-radius:var(--radius-lg);
  font-size:var(--text-sm);outline:none;}
.url-input:focus{border-color:var(--color-primary);
  box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 18%,transparent);}
.url-input::placeholder{color:var(--color-text-faint);}
.url-input.error{border-color:var(--color-error);}
.btn-load{padding:var(--space-3) var(--space-6);background:var(--color-primary);color:#fff;
  border-radius:var(--radius-lg);font-size:var(--text-sm);font-weight:600;}
.btn-load:hover{background:var(--color-primary-hover);}
.btn-load:active{background:var(--color-primary-active);}

/* VIDEO */
.video-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--radius-xl);
  overflow:hidden;background:var(--color-surface);box-shadow:var(--shadow-lg);}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:var(--space-4);
  color:var(--color-text-faint);}
.video-placeholder svg{opacity:.3;}
.video-placeholder p{font-size:var(--text-sm);color:var(--color-text-muted);}

/* TRANSCRIPT */
.transcript-card{background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-sm);}
.transcript-header{display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--color-divider);
  background:var(--color-surface-2);}
.transcript-title{font-size:var(--text-sm);font-weight:600;
  display:flex;align-items:center;gap:var(--space-2);}
.cap-badge{font-size:var(--text-xs);padding:2px 10px;border-radius:var(--radius-full);font-weight:500;}
.cap-badge.ok{background:var(--color-success-hl);color:var(--color-success);}
.cap-badge.loading{background:color-mix(in oklch,var(--color-primary) 14%,transparent);color:var(--color-primary);}
.cap-badge.none{background:color-mix(in oklch,var(--color-text-faint) 12%,transparent);color:var(--color-text-muted);}
.cap-badge.error{background:var(--color-warning-hl);color:var(--color-warning);}

.subtitle-display{padding:var(--space-5) var(--space-6);min-height:76px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  border-bottom:1px solid var(--color-divider);}
.subtitle-text{font-size:var(--text-lg);font-weight:500;letter-spacing:-.015em;line-height:1.4;}
.subtitle-text.empty{font-size:var(--text-sm);color:var(--color-text-faint);
  font-style:italic;font-weight:400;}

.transcript-list{max-height:240px;overflow-y:auto;padding:var(--space-2);}
.transcript-list::-webkit-scrollbar{width:5px;}
.transcript-list::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:var(--radius-full);}
.transcript-item{display:flex;gap:var(--space-3);padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);cursor:pointer;transition:background var(--transition);}
.transcript-item:hover{background:var(--color-surface-2);}
.transcript-item.active{background:var(--color-primary-hl);}
.t-time{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--color-text-faint);
  flex-shrink:0;padding-top:.2em;min-width:38px;}
.t-text{font-size:var(--text-sm);line-height:1.5;color:var(--color-text);}
.transcript-item.active .t-text{font-weight:500;}
.transcript-empty{padding:var(--space-8);text-align:center;
  color:var(--color-text-faint);font-size:var(--text-sm);}

/* CONTROLS */
.controls-card{background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-xl);padding:var(--space-5);
  display:flex;flex-direction:column;gap:var(--space-4);box-shadow:var(--shadow-sm);}
.progress-wrap{display:flex;align-items:center;gap:var(--space-3);}
.progress-time{font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--color-text-muted);min-width:36px;}
.progress-track{flex:1;height:5px;background:var(--color-surface-dynamic);
  border-radius:var(--radius-full);cursor:pointer;transition:height var(--transition);}
.progress-track:hover{height:7px;}
.progress-fill{height:100%;background:var(--color-primary);
  border-radius:var(--radius-full);transition:width .15s linear;}

.chunk-nav{display:flex;align-items:center;justify-content:center;gap:var(--space-3);}
.nav-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);background:var(--color-surface-2);
  border:1px solid var(--color-border);color:var(--color-text-muted);}
.nav-btn:hover:not(:disabled){background:var(--color-surface-offset);color:var(--color-text);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-btn.replay-btn{width:58px;height:58px;border-radius:var(--radius-lg);
  background:var(--color-primary);color:#fff;border:none;font-size:1.6rem;}
.nav-btn.replay-btn:hover{background:var(--color-primary-hover);}
.nav-btn.replay-btn:active{transform:scale(.95);}
.chunk-label{font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--color-text-muted);text-align:center;min-width:110px;line-height:1.5;}
.chunk-label strong{display:block;font-size:var(--text-sm);color:var(--color-text);
  font-family:var(--font-body);font-weight:600;}

.divider{height:1px;background:var(--color-divider);}

.settings-row{display:flex;flex-wrap:wrap;gap:var(--space-4);align-items:center;}
.setting-group{display:flex;align-items:center;gap:var(--space-2);}
.setting-label{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;}
.setting-field{padding:var(--space-1) var(--space-3);background:var(--color-surface-2);
  border:1px solid var(--color-border);border-radius:var(--radius-md);
  font-size:var(--text-xs);font-family:var(--font-mono);outline:none;min-width:64px;}
.setting-field:focus{border-color:var(--color-primary);}
select.setting-field{min-width:72px;}

.toggle-group{display:flex;align-items:center;gap:var(--space-2);cursor:pointer;user-select:none;}
.toggle{width:36px;height:20px;background:var(--color-surface-dynamic);
  border-radius:var(--radius-full);position:relative;flex-shrink:0;
  transition:background var(--transition);}
.toggle.on{background:var(--color-primary);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
  background:#fff;border-radius:50%;box-shadow:0 1px 3px oklch(0 0 0/.25);
  transition:transform var(--transition);}
.toggle.on::after{transform:translateX(16px);}

.kb-row{display:flex;gap:var(--space-4);flex-wrap:wrap;}
.kb-hint{display:flex;align-items:center;gap:var(--space-1);
  font-size:var(--text-xs);color:var(--color-text-faint);}
.kbd{padding:1px 7px;background:var(--color-surface-2);
  border:1px solid var(--color-border);border-bottom-width:2px;
  border-radius:var(--radius-sm);font-family:var(--font-mono);
  font-size:.68rem;line-height:1.7;color:var(--color-text-muted);}

@media(max-width:580px){
  .url-row{flex-direction:column;}
  .btn-load{width:100%;}
  .settings-row{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <svg class="logo-icon" width="34" height="34" viewBox="0 0 34 34" fill="none">
        <rect width="34" height="34" rx="9" fill="currentColor" opacity=".15"/>
        <path d="M13 11v12l10-6-10-6z" fill="currentColor"/>
        <rect x="7" y="27" width="20" height="2.5" rx="1.25" fill="currentColor" opacity=".4"/>
      </svg>
      <div>
        <div class="logo-text">Shadow Player</div>
        <div class="logo-sub">Language shadowing · YouTube</div>
      </div>
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme"></button>
  </header>

  <div class="url-card">
    <span class="url-label">YouTube URL</span>
    <div class="url-row">
      <input id="urlInput" class="url-input" type="url"
        placeholder="https://youtu.be/… or https://youtube.com/watch?v=…"
        autocomplete="off" spellcheck="false"/>
      <button class="btn-load" id="loadBtn">Load</button>
    </div>
  </div>

  <div class="video-wrap">
    <div class="video-placeholder" id="placeholder">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="5" width="20" height="14" rx="2.5"/>
        <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
      </svg>
      <p>Paste a YouTube URL above and press Load</p>
    </div>
    <div id="yt-player" style="display:none;position:absolute;inset:0;width:100%;height:100%;"></div>
  </div>

  <div class="transcript-card" id="transcriptCard" style="display:none;">
    <div class="transcript-header">
      <span class="transcript-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Transcript
      </span>
      <span class="cap-badge loading" id="capBadge">Loading…</span>
    </div>
    <div class="subtitle-display">
      <span class="subtitle-text empty" id="subtitleText">No active caption</span>
    </div>
    <div class="transcript-list" id="transcriptList">
      <div class="transcript-empty" id="transcriptEmpty">Captions will appear here.</div>
    </div>
  </div>

  <div class="controls-card" id="controlsCard" style="display:none;">
    <div class="progress-wrap">
      <span class="progress-time" id="timeCurrent">0:00</span>
      <div class="progress-track" id="progressTrack" tabindex="0" role="slider" aria-label="Progress">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-time" id="timeDuration">0:00</span>
    </div>
    <div class="chunk-nav">
      <button class="nav-btn" id="prevBtn" disabled aria-label="Previous chunk">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn replay-btn" id="replayBtn" aria-label="Replay">↺</button>
      <button class="nav-btn" id="nextBtn" disabled aria-label="Next chunk">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="chunk-label">
        <strong id="chunkTime">—</strong>
        <span id="chunkCounter">Load a video to start</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="settings-row">
      <div class="setting-group">
        <label class="setting-label" for="chunkSizeInput">Chunk</label>
        <input class="setting-field" id="chunkSizeInput" type="number" min="3" max="120" value="10" step="1"/>
        <span class="setting-label">sec</span>
      </div>
      <div class="setting-group">
        <label class="setting-label" for="speedSelect">Speed</label>
        <select class="setting-field" id="speedSelect">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </div>
      <div class="toggle-group" id="autoToggleGroup" role="switch" aria-checked="false" tabindex="0">
        <div class="toggle" id="autoToggle"></div>
        <span class="setting-label">Auto-advance</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="kb-row">
      <div class="kb-hint"><kbd class="kbd">Space</kbd> Replay</div>
      <div class="kb-hint"><kbd class="kbd">←</kbd> Prev</div>
      <div class="kb-hint"><kbd class="kbd">→</kbd> Next</div>
      <div class="kb-hint"><kbd class="kbd">R</kbd> Speed</div>
    </div>
  </div>

</div>
<script>
const WORKER_URL = "https://aged-sky-56f6.moho7596.workers.dev";

let player=null,ready=false,videoId=null,duration=0;
let chunk=0,chunkSize=10,speed=1,autoAdvance=false;
let captions=[],timerRef=null;
const SPEEDS=[0.5,0.75,1,1.25,1.5,2];let speedIdx=2;

const $=id=>document.getElementById(id);
const urlInput=$('urlInput'),loadBtn=$('loadBtn');
const placeholder=$('placeholder'),ytEl=$('yt-player');
const controlsCard=$('controlsCard'),transcriptCard=$('transcriptCard');
const prevBtn=$('prevBtn'),nextBtn=$('nextBtn'),replayBtn=$('replayBtn');
const chunkTime=$('chunkTime'),chunkCounter=$('chunkCounter');
const progressFill=$('progressFill'),progressTrack=$('progressTrack');
const timeCurrent=$('timeCurrent'),timeDuration=$('timeDuration');
const chunkSizeInput=$('chunkSizeInput'),speedSelect=$('speedSelect');
const autoToggle=$('autoToggle'),autoToggleGroup=$('autoToggleGroup');
const capBadge=$('capBadge'),subtitleText=$('subtitleText');
const transcriptList=$('transcriptList'),transcriptEmpty=$('transcriptEmpty');

// Theme
(function(){
  const btn=$('themeBtn'),html=document.documentElement;
  let d=html.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  html.setAttribute('data-theme',d);
  function upd(){
    btn.innerHTML=d==='dark'
      ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  }
  upd();
  btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';html.setAttribute('data-theme',d);upd();});
})();

// Utils
function parseVideoId(url){const m=url.match(/(?:v=|youtu\.be\/|\/shorts\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}
function fmt(s){s=Math.max(0,Math.floor(s));return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function totalChunks(){return duration?Math.ceil(duration/chunkSize):0;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Load video
loadBtn.addEventListener('click',loadVideo);
urlInput.addEventListener('keydown',e=>{if(e.key==='Enter')loadVideo();});
function loadVideo(){
  const id=parseVideoId(urlInput.value.trim());
  if(!id){urlInput.classList.add('error');setTimeout(()=>urlInput.classList.remove('error'),1500);return;}
  videoId=id;chunk=0;captions=[];ready=false;
  clearInterval(timerRef);resetSubtitle();renderTranscript();setCapBadge('loading');
  placeholder.style.display='none';
  ytEl.style.display='block';
  controlsCard.style.display='flex';
  transcriptCard.style.display='block';
  initPlayer(id);
  loadCaptions(id);
}

// Captions
async function loadCaptions(vid){
  try{
    const res=await fetch(`${WORKER_URL}?v=${vid}`);
    const data=await res.json();
    if(!res.ok||data.error){setCapBadge('none');transcriptEmpty.textContent=data.error||'No captions available.';return;}
    captions=data.captions||[];
    if(!captions.length){setCapBadge('none');return;}
    setCapBadge('ok',`${data.auto?'Auto':'Manual'} · ${data.track||'en'} · ${data.count} lines`);
    renderTranscript();
  }catch(e){
    setCapBadge('error');transcriptEmpty.textContent='Could not reach the worker.';
  }
}
function setCapBadge(s,label){
  capBadge.className='cap-badge '+s;
  capBadge.textContent=label||{ok:'Available',loading:'Loading…',none:'Not available',error:'Error'}[s]||s;
}

// Render transcript
function renderTranscript(){
  transcriptList.querySelectorAll('.transcript-item').forEach(el=>el.remove());
  if(!captions.length){transcriptEmpty.style.display='block';return;}
  transcriptEmpty.style.display='none';
  captions.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='transcript-item';div.dataset.idx=i;
    div.innerHTML=`<span class="t-time">${fmt(c.start)}</span><span class="t-text">${esc(c.text)}</span>`;
    div.addEventListener('click',()=>{
      if(!ready||!player)return;
      chunk=Math.floor(c.start/chunkSize);
      player.seekTo(c.start,true);player.playVideo();updateChunkUI();
    });
    transcriptList.appendChild(div);
  });
}
function highlightCaption(idx){
  transcriptList.querySelectorAll('.transcript-item').forEach(el=>
    el.classList.toggle('active',parseInt(el.dataset.idx)===idx));
  const a=transcriptList.querySelector('.transcript-item.active');
  if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// YouTube player
(function(){const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);})();
window.onYouTubeIframeAPIReady=function(){};
function initPlayer(vid){
  if(player){try{player.destroy();}catch{}player=null;}
  player=new window.YT.Player('yt-player',{
    videoId:vid,
    playerVars:{autoplay:1,rel:0,modestbranding:1,start:0,cc_load_policy:0},
    events:{
      onReady(e){
        ready=true;const d=e.target.getDuration();
        if(d){duration=d;timeDuration.textContent=fmt(d);}
        e.target.setPlaybackRate(speed);updateChunkUI();
      },
      onStateChange(e){
        const S=window.YT.PlayerState;
        if(e.data===S.PLAYING)startTimer();else clearInterval(timerRef);
      }
    }
  });
}

// Timer
function startTimer(){
  clearInterval(timerRef);
  timerRef=setInterval(()=>{
    if(!player||!player.getCurrentTime)return;
    const t=player.getCurrentTime(),end=(chunk+1)*chunkSize;
    timeCurrent.textContent=fmt(t);
    if(duration>0)progressFill.style.width=(t/duration*100)+'%';
    const idx=captions.findIndex(c=>t>=c.start&&t<c.end);
    if(idx>=0){subtitleText.textContent=captions[idx].text;subtitleText.className='subtitle-text';highlightCaption(idx);}
    else resetSubtitle();
    if(t>=end){
      clearInterval(timerRef);resetSubtitle();
      const tot=Math.ceil((player.getDuration?player.getDuration():duration)/chunkSize);
      if(autoAdvance){const n=chunk+1;if(n<tot){chunk=n;player.seekTo(n*chunkSize,true);player.playVideo();updateChunkUI();}else player.pauseVideo();}
      else player.pauseVideo();
    }
  },150);
}
function resetSubtitle(){subtitleText.textContent='No active caption';subtitleText.className='subtitle-text empty';}

// Navigation
function goToChunk(idx){
  if(!player||!ready)return;
  chunk=Math.max(0,Math.min(idx,totalChunks()-1));
  resetSubtitle();player.seekTo(chunk*chunkSize,true);player.playVideo();updateChunkUI();
}
replayBtn.addEventListener('click',()=>goToChunk(chunk));
prevBtn.addEventListener('click',()=>goToChunk(chunk-1));
nextBtn.addEventListener('click',()=>goToChunk(chunk+1));
function updateChunkUI(){
  const tot=totalChunks(),s=chunk*chunkSize,e=Math.min((chunk+1)*chunkSize,duration);
  chunkTime.textContent=tot>0?`${fmt(s)} – ${fmt(e)}`:'—';
  chunkCounter.textContent=tot>0?`Chunk ${chunk+1} of ${tot}`:'Load a video to start';
  prevBtn.disabled=chunk<=0;nextBtn.disabled=tot===0||chunk>=tot-1;
}

// Settings
chunkSizeInput.addEventListener('change',()=>{
  chunkSize=Math.max(3,Math.min(120,parseInt(chunkSizeInput.value)||10));
  chunkSizeInput.value=chunkSize;chunk=0;updateChunkUI();
});
speedSelect.addEventListener('change',()=>{
  speed=parseFloat(speedSelect.value);speedIdx=SPEEDS.indexOf(speed);
  if(player&&player.setPlaybackRate)player.setPlaybackRate(speed);
});
function toggleAuto(){
  autoAdvance=!autoAdvance;
  autoToggle.classList.toggle('on',autoAdvance);
  autoToggleGroup.setAttribute('aria-checked',String(autoAdvance));
}
autoToggleGroup.addEventListener('click',toggleAuto);
autoToggleGroup.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleAuto();}});

// Progress seek
progressTrack.addEventListener('click',e=>{
  if(!ready||!player||!duration)return;
  const r=progressTrack.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  chunk=Math.floor(pct*duration/chunkSize);
  player.seekTo(pct*duration,true);player.playVideo();updateChunkUI();
});

// Keyboard
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if(!videoId)return;
  if(e.code==='Space'){e.preventDefault();goToChunk(chunk);}
  if(e.code==='ArrowRight'){e.preventDefault();goToChunk(chunk+1);}
  if(e.code==='ArrowLeft'){e.preventDefault();goToChunk(chunk-1);}
  if(e.code==='KeyR'){
    speedIdx=(speedIdx+1)%SPEEDS.length;speed=SPEEDS[speedIdx];
    speedSelect.value=speed;
    if(player&&player.setPlaybackRate)player.setPlaybackRate(speed);
  }
});
</script>
</body>
</html>
